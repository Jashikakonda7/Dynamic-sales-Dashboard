<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dynamic Sales Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  * { font-family: 'DM Sans', sans-serif; }
  h1, h2, h3, .brand { font-family: 'Syne', sans-serif; }
  body { background: #0a0a0f; color: #e8e8f0; min-height: 100vh; }
  .glass {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 16px;
  }
  .glow-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; border-radius: 10px; color: white;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 0 20px rgba(99,102,241,0.3);
  }
  .glow-btn:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(99,102,241,0.5); }
  .input-field {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #e8e8f0;
    padding: 12px 16px; width: 100%; font-size: 14px; transition: border-color 0.2s;
  }
  .input-field:focus { outline: none; border-color: #6366f1; }
  .input-field::placeholder { color: rgba(255,255,255,0.3); }
  .drop-zone {
    border: 2px dashed rgba(99,102,241,0.4);
    border-radius: 16px; transition: all 0.3s; cursor: pointer;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #6366f1; background: rgba(99,102,241,0.08);
  }
  .kpi-card {
    background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1));
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 14px; padding: 20px; transition: transform 0.2s;
  }
  .kpi-card:hover { transform: translateY(-3px); }
  .tab-btn { transition: all 0.2s; }
  .tab-btn.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-number { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .badge-text   { background: rgba(34,197,94,0.2);  color: #4ade80; }
  .badge-date   { background: rgba(251,191,36,0.2); color: #fbbf24; }
  .badge-bool   { background: rgba(239,68,68,0.2);  color: #f87171; }
  .chart-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px; padding: 24px;
  }
  .chart-container { position: relative; height: 280px; }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    z-index: 9999; animation: slideIn 0.3s ease;
  }
  .toast-success { background: #064e3b; border: 1px solid #059669; color: #6ee7b7; }
  .toast-error   { background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; }
  @keyframes slideIn { from { transform: translateX(100px); opacity:0; } to { transform: none; opacity:1; } }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<nav class="flex items-center justify-between px-8 py-4 border-b border-white/5">
  <div class="brand text-xl font-800 text-white">
    ⚡ Sales<span style="color:#6366f1">Dashboard</span>
  </div>
  <div id="navUser" class="hidden items-center gap-3">
    <span id="navUsername" class="text-sm text-white/60"></span>
    <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300">Logout</button>
  </div>
</nav>

<!-- AUTH SECTION -->
<div id="authSection" class="flex items-center justify-center min-h-[88vh] px-4">
  <div class="glass p-8 w-full max-w-md">
    <div class="flex gap-2 mb-8 p-1 bg-white/5 rounded-xl">
      <button id="tabLogin" class="tab-btn active flex-1 py-2 rounded-lg text-sm font-600" onclick="switchTab('login')">Login</button>
      <button id="tabRegister" class="tab-btn flex-1 py-2 rounded-lg text-sm font-600 text-white/50" onclick="switchTab('register')">Register</button>
    </div>

    <div id="loginForm">
      <h2 class="text-2xl font-700 mb-6">Welcome back</h2>
      <div class="space-y-4">
        <input id="loginUsername" class="input-field" type="text" placeholder="Username" />
        <input id="loginPassword" class="input-field" type="password" placeholder="Password" />
        <button class="glow-btn w-full py-3 text-sm" onclick="login()">
          <span id="loginBtnText">Sign In</span>
          <span id="loginSpinner" class="spinner hidden"></span>
        </button>
      </div>
    </div>

    <div id="registerForm" class="hidden">
      <h2 class="text-2xl font-700 mb-6">Create account</h2>
      <div class="space-y-4">
        <input id="regUsername" class="input-field" type="text" placeholder="Username" />
        <input id="regEmail" class="input-field" type="email" placeholder="Email" />
        <input id="regPassword" class="input-field" type="password" placeholder="Password" />
        <button class="glow-btn w-full py-3 text-sm" onclick="register()">
          <span id="regBtnText">Create Account</span>
          <span id="regSpinner" class="spinner hidden"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD SECTION -->
<div id="dashboardSection" class="hidden px-6 py-8 max-w-7xl mx-auto">

  <div id="uploadArea" class="drop-zone p-12 text-center mb-8">
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="hidden" />
    <div class="text-5xl mb-4">📊</div>
    <p class="text-lg font-600 text-white mb-1">Drop your Excel or CSV file here</p>
    <p class="text-sm text-white/40">or click to browse &nbsp;·&nbsp; .xlsx &nbsp;·&nbsp; .xls &nbsp;·&nbsp; .csv</p>
    <div id="uploadSpinner" class="hidden mt-4">
      <div class="spinner mx-auto"></div>
      <p class="text-sm text-white/40 mt-2">Uploading & analyzing...</p>
    </div>
  </div>

  <div id="savedFilesSection" class="mb-8 hidden">
    <h3 class="text-lg font-700 mb-4">📁 My Uploaded Files</h3>
    <div id="savedFilesList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
  </div>

  <div id="fileInfo" class="hidden mb-8">
    <div class="glass p-6">
      <h3 class="text-lg font-700 mb-4">📄 File Information</h3>
      <div id="fileDetails" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>
  </div>

  <div id="kpiSection" class="hidden mb-8">
    <h3 class="text-lg font-700 mb-4">📈 Key Performance Indicators</h3>
    <div id="kpiGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
  </div>

  <div id="columnInfo" class="hidden mb-8">
    <div class="glass p-6">
      <h3 class="text-lg font-700 mb-4">🔍 Detected Columns</h3>
      <div id="columnDetails" class="overflow-x-auto"></div>
    </div>
  </div>

  <div id="chartsSection" class="hidden">
    <h3 class="text-lg font-700 mb-4">📊 Generated Charts</h3>
    <div id="chartsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
